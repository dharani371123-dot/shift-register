# Tiny Tapeout project information
project:
  title:        "Shift Register"
  author:       "dharani"
  discord:      ""
  description:  "4-bit serial shift register"
  language:     "Verilog"
  clock_hz:     50000000

  # Tile size
  tiles: "1x1"

  # Top module name
  top_module:  "shift_register"

  # Source files
  source_files:
